    <script>
        // --- Background Music System ---
        let backgroundMusicEnabled = true;
        let musicPlayer = null;
        let currentMusicLevel = 1;

        // Using noCookie YouTube URLs converted to audio via yt-proxy or direct streams
        // Alternative: Using these as fallback audio URLs
        const musicTracks = {
            1: "https://cdn.pixabay.com/download/audio/2024/04/15/audio_5c3e0d9b9e.mp3", // Bright, energetic
            2: "https://cdn.pixabay.com/download/audio/2024/03/22/audio_6b8f4c2a1d.mp3", // Moderate intensity
            3: "https://cdn.pixabay.com/download/audio/2024/02/10/audio_8d2e1b5f3c.mp3"  // Dark, intense
        };

        // NOTE: The above URLs are placeholders. For your YouTube videos, use one of these methods:
        // Method 1: Download from YouTube and host on your server
        // Method 2: Use a service like https://www.youtube-mp3.org/ to convert
        // Method 3: Replace with Pixabay Music or similar free music service

        function toggleBackgroundMusic() {
            backgroundMusicEnabled = !backgroundMusicEnabled;
            const btn = document.getElementById('music-toggle-btn');
            btn.innerText = backgroundMusicEnabled ? '🔊 Music: ON' : '🔇 Music: OFF';
            
            if (backgroundMusicEnabled) {
                playBackgroundMusic(currentMusicLevel);
            } else {
                stopBackgroundMusic();
            }
        }

        async function playBackgroundMusic(level) {
            if (!backgroundMusicEnabled) return;

            stopBackgroundMusic();
            currentMusicLevel = level;

            const trackUrl = musicTracks[level];
            if (!trackUrl) {
                console.warn(`No music track found for level ${level}`);
                return;
            }

            try {
                musicPlayer = new Audio(trackUrl);
                musicPlayer.loop = true;
                musicPlayer.volume = 0.25; // 25% volume for background
                
                // Attempt to play
                const playPromise = musicPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay prevented:", error);
                        console.log("Music will start on first user interaction");
                    });
                }
            } catch (e) {
                console.error("Failed to play background music:", e);
            }
        }

        function stopBackgroundMusic() {
            if (musicPlayer) {
                musicPlayer.pause();
                musicPlayer.currentTime = 0;
                musicPlayer = null;
            }
        }

        // Try to play music on first user interaction (click/touch)
        document.addEventListener('click', () => {
            if (backgroundMusicEnabled && (!musicPlayer || musicPlayer.paused)) {
                playBackgroundMusic(currentMusicLevel);
            }
        }, { once: true });
